name: ai-processor CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ai-processor/**
      - .github/workflows/ai-processor-ci.yml
  pull_request:
    branches: [main]
    paths:
      - ai-processor/**
      - .github/workflows/ai-processor-ci.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-java@7a6d8a8234af8eb26422e24052264dce2191b919 # v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Run tests
        working-directory: ai-processor
        run: ./mvnw verify -q
        env:
          OPENAI_API_KEY: test-api-key
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          SPRING_PROFILES_ACTIVE: local

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@ca877d9245402d35e71e62935439e9b4e4bbfe4a # v6
        with:
          context: ./ai-processor
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ai-processor:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@2ead5e88272b2b8a4b065f6b6f02dbb5088a3781 # v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd /opt/ai-support-platform
            docker compose pull ai-processor
            docker compose up -d ai-processor
            docker system prune -f
