groups:
  - name: support-platform
    rules:
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected on {{ $labels.job }}"

      - alert: SlowResponseTime
        expr: http_server_requests_seconds_max > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Slow response time on {{ $labels.job }}"

      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"